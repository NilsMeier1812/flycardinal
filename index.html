<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flug-Tagebuch Karte</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        .popup-content h3 { margin: 0 0 5px 0; font-size: 16px; }
        .popup-content p { margin: 0 0 10px 0; color: #555; }
        .flight-list { max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .flight-item { background: #f9f9f9; padding: 5px; margin-bottom: 5px; border-radius: 4px; border-left: 3px solid #007bff; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Deine Firebase-Konfiguration
        const firebaseConfig = {
            apiKey: "AIzaSyA9ONDoCc-PahLWVkvECTZz1E9U8dpjgPc",
            authDomain: "flycardinal-a3635.firebaseapp.com",
            projectId: "flycardinal-a3635",
            storageBucket: "flycardinal-a3635.firebasestorage.app",
            messagingSenderId: "47686059980",
            appId: "1:47686059980:web:39711435422c3447ecbf69"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const flightsCollection = collection(db, "flights");

        const map = L.map('map').setView([50.0, 10.0], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let mapMarkers = [];
        let allFlights = [];

        onSnapshot(flightsCollection, (snapshot) => {
            allFlights = [];
            snapshot.forEach((doc) => {
                allFlights.push({ id: doc.id, ...doc.data() });
            });
            updateMap();
        });

        function updateMap() {
            mapMarkers.forEach(marker => map.removeLayer(marker));
            mapMarkers = [];

            const groupedFlights = {};
            allFlights.forEach(flight => {
                if (!groupedFlights[flight.icao]) {
                    groupedFlights[flight.icao] = {
                        name: flight.name, lat: flight.lat, lon: flight.lon, records: []
                    };
                }
                groupedFlights[flight.icao].records.push(flight);
            });

            for (const icao in groupedFlights) {
                const airport = groupedFlights[icao];
                airport.records.sort((a, b) => new Date(b.date) - new Date(a.date));

                let flightListHTML = '';
                airport.records.forEach(record => {
                    flightListHTML += `
                        <div class="flight-item">
                            <strong>${formatDate(record.date)}</strong><br>
                            ${record.notes ? record.notes : '<i>Keine Notizen</i>'}
                        </div>
                    `;
                });

                const popupContent = `
                    <div class="popup-content">
                        <h3>${airport.name} (${icao})</h3>
                        <p><strong>Besuche insgesamt:</strong> ${airport.records.length}</p>
                        <div class="flight-list">${flightListHTML}</div>
                    </div>
                `;

                const marker = L.marker([airport.lat, airport.lon])
                    .addTo(map)
                    .bindPopup(popupContent, { maxWidth: 300 });
                mapMarkers.push(marker);
            }
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('de-DE', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }
    </script>
</body>
</html>
